name: Report a problem
description: Open a public Sessions support ticket for a reproducible problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Sessions.

        This ticket is public. Do not paste transcripts, prompts, terminal output, session IDs, filesystem paths, tokens, credentials, environment variables, or private source code. `sessions support --diagnostics` produces a small preview that excludes those fields, but you should still review it before pasting.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the visible behavior and the action immediately before it.
      placeholder: I clicked… Sessions showed…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: A small, safe reproduction is more useful than a raw log dump.
      placeholder: |
        1. Open…
        2. Choose…
        3. See…
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Sessions version
      description: Run `sessions version`.
      placeholder: v0.2.3
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows client
        - Android client
        - Other
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Optional diagnostic preview
      description: Paste only the reviewed output of `sessions support --diagnostics`. Do not paste `sessions doctor`, raw logs, or transcripts.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I reviewed this ticket and removed private session content, paths, IDs, credentials, and source code.
          required: true
